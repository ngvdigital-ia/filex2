    let notificationCount = 0;

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // "sacola" que so repete uma pessoa/cidade depois de esgotar todas as outras
    function createBag(items) {
      let bag = [];
      let lastItem = null;

      function refill() {
        bag = shuffle(items);
        if (lastItem && bag[bag.length - 1] === lastItem && bag.length > 1) {
          [bag[bag.length - 1], bag[bag.length - 2]] = [bag[bag.length - 2], bag[bag.length - 1]];
        }
      }

      refill();

      return function next() {
        if (bag.length === 0) refill();
        const item = bag.pop();
        lastItem = item;
        return item;
      };
    }

    const nextUsaItem = createBag(usaMessages);
    const nextUkItem = createBag(ukMessages);

    function pickNotificationItem() {
      notificationCount++;
      const position = notificationCount % 5;
      // a cada 5 notificacoes: 1a-4a sao dos EUA e a 5a (que fecha o ciclo) e do UK

      }, SHOW_TIME);
    }

    setTimeout(() => {
      showRandomNotification();
      setInterval(showRandomNotification, INTERVAL_TIME);
    }, START_DELAY);

        <script>
/*
* Remove os zeros &agrave; direita de um n&uacute;mero decimal dentro de uma string
* @param  {String} string - String que cont&eacute;m o n&uacute;mero decimal
* @returns  {String} - Retorna a string com os zeros &agrave; direita removidos
* @example  removeZerosRight('75.00') -> '75'
*/
function removeZerosRight(string) {
    const regex = /\d+(\.\d+)?/;
    const match = string.match(regex); // Procura o n&uacute;mero na string

    if (match) {
      const numero = parseFloat(match[0]);
      // Verifica se o n&uacute;mero tem exatamente duas casas decimais e se ambas s&atilde;o zero
      if (numero % 1 === 0) {
        return string.replace(regex, Math.floor(numero).toString());
      } else {
        return string;
      }
    } else {
      return string; // Retorna a string original se n&atilde;o encontrar um n&uacute;mero
    }
  }


/*
* C&aacute;lculo do valor do strokeDashoffset para o gr&aacute;fico circular
* @param  {Number} currentValuePercent - Valor atual do gr&aacute;fico circular
*/
function caculateStrokeDashoffset(currentValuePercent, totalValuePX = 282.743) {
    if (currentValuePercent === undefined || Number(currentValuePercent) === 'NaN' || currentValuePercent === '') {
        return;
    }
    const currentValuePX = (currentValuePercent * totalValuePX) / 100;
    return totalValuePX - currentValuePX; // Retorna o valor do strokeDashoffset
};

/*
* C&aacute;lculo do valor da porcentagem do gr&aacute;fico circular
* @param  {Number} currentValuetrokeDashoffset - Valor atual do gr&aacute;fico circular
*/
function caculatePercentage(currentValuetrokeDashoffset, totalValue = 282.743) {
    if (currentValuetrokeDashoffset === undefined || Number(currentValuetrokeDashoffset) === 'NaN') {
        return;
    }
    const currentValuePercent = (currentValuetrokeDashoffset / totalValue) * 100;
    return 100 - currentValuePercent; // Retorna o valor da porcentagem
}

/*
* Monta o gr&aacute;fico circular com anima&ccedil;&atilde;o
* @param  {HTMLElement} element - Elemento HTML que cont&eacute;m o gr&aacute;fico circular
*/
function mountChartCircular(element){
    const staticValue = caculatePercentage(element.dataset.chartCircular); // Pega o valor est&aacute;tico do gr&aacute;fico
    const isDynamically = element.dataset?.chartCircularDynamic !== undefined; // Verifica se o gr&aacute;fico &eacute; din&acirc;mico

    const validDynamicValue = () => { // Calcula e retorna o valor din&acirc;mico
        const svgElement = element.closest('svg'); // Pega o elemento SVG pai do elemento atual
        const elementDynamic = svgElement?.parentElement.querySelector('[data-chart-dynamic-value]'); // Pega o elemento din&acirc;mico do gr&aacute;fico
        if(elementDynamic){ // Se existir um elemento din&acirc;mico - Atualiza seu valor
            elementDynamic && updateScore(elementDynamic); // Calcula a express&atilde;o em todos os elementos correspondentes internos
            elementDynamic && calcExpression(elementDynamic); // Calcula a express&atilde;o em todos os elementos correspondentes internos
        }
        const isValidDynamicInnerText = !!caculateStrokeDashoffset(elementDynamic?.innerText);  // Previne que elementDynamic?.innerText seja uma string
        const percentageElement = svgElement.parentElement.querySelector('.chart-area-circular-text')?.querySelector('p'); // Label do gr&aacute;fico circular
        const labelPercentage = isValidDynamicInnerText ? elementDynamic?.innerText + '%' : staticValue + '%'; // Se existir um elemento din&acirc;mico, retorna o valor calculado, sen&atilde;o, retorna o valor est&aacute;tico
        percentageElement.innerText = isValidDynamicInnerText ? removeZerosRight(labelPercentage) : labelPercentage; // Atualiza o valor do label do gr&aacute;fico circular

        return isValidDynamicInnerText ? caculateStrokeDashoffset(elementDynamic?.innerText) : caculateStrokeDashoffset(staticValue) // Se existir um elemento din&acirc;mico, retorna o valor calculado, sen&atilde;o, retorna o valor est&aacute;tico
    }
    const auxValue = isDynamically ? validDynamicValue() : caculateStrokeDashoffset(staticValue);
    const initialValue = '282.743px';  // Valor inicial para come&ccedil;ar a anima&ccedil;&atilde;o do gr&aacute;fico circular

    element.style.transitionDuration = '0s';
    element.style.strokeDashoffset = initialValue;

    setTimeout(() => {
        element.style.transitionDuration = '1.5s';
        element.style.strokeDashoffset = auxValue + 'px'
    }, 500)
}

/*
* Monta o gr&aacute;fico de barra com anima&ccedil;&atilde;o
* @param  {HTMLElement} element - Elemento HTML que cont&eacute;m o gr&aacute;fico de barra
*/
function mountChartBar(element){
    const staticValue = element.dataset.chartBar; // Pega o valor est&aacute;tico do gr&aacute;fico
    const bar = element.children[1]; // Pega o elemento filho na posi&ccedil;&atilde;o 1 (barra)
    const label = element.children[0]; // Pega o elemento filho na posi&ccedil;&atilde;o 0 (label)
    const elementDynamic = element.querySelector('[data-chart-dynamic-value]'); // Pega o elemento com o data-chart-dynamic-value

    const validDynamicValue = () => { // Calcula e retorna o valor din&acirc;mico
        updateScore(elementDynamic); // Calcula a express&atilde;o em todos os elementos correspondentes internos
        calcExpression(elementDynamic); // Calcula a express&atilde;o em todos os elementos correspondentes internos
        const isValidDynamicInnerText = !!caculateStrokeDashoffset(elementDynamic?.innerText);  // Previne que elementDynamic?.innerText seja uma string
        return isValidDynamicInnerText ? elementDynamic?.innerText : staticValue // Se for valido/existir um elemento din&acirc;mico, retorna o valor calculado, sen&atilde;o, retorna o valor est&aacute;tico
    }

    const auxValue = !!elementDynamic ? validDynamicValue() : staticValue; // Se existir um elemento din&acirc;mico, retorna o valor calculado, sen&atilde;o, retorna o valor est&aacute;tico
    const initialValue = 0; // Valor inicial para come&ccedil;ar a anima&ccedil;&atilde;o da barra

    label.style.color='inherit';
    label.innerText = removeZerosRight(auxValue) + '%'; // Atualiza o valor do label do gr&aacute;fico de barra

    bar.style.transitionDuration = initialValue+'s';
    bar.style.height = initialValue;

    setTimeout(() => { // Inicia a anima&ccedil;&atilde;o da barra
        bar.style.transitionDuration = '1.5s';

<script>
  function convertValue(value, fromUnit, toUnit) {

      throw new Error(`Convers&atilde;o de ${fromUnit} para ${toUnit} n&atilde;o suportada.`);
    }

    // Se for inteiro, retorna inteiro
    if (Number.isInteger(result)) {
      return result;
    }

    // Sen&atilde;o, retorna com 2 casas decimais
    return Number(result.toFixed(2));
  }

  function createSliderRule(container) {
    const scaleEl = container.querySelector('.slider-rule-scale');
    const numberEl = container.querySelector('.slider-rule-value');
    const unitLabelEl = container.querySelector('.slider-rule-unit-label');
    const toggleEls = container.querySelectorAll('.slider-rule-unit-toggle .unit');

    let minVal = parseFloat(toggleEls[0].dataset.sliderRuleMin);
    let maxVal = parseFloat(toggleEls[0].dataset.sliderRuleMax);
    let currentVal = Math.round((minVal + maxVal) / 2);
    let unit = toggleEls[0].textContent;
    let dataFieldBinding = document.querySelectorAll(`[data-field-binding-id="${container.id}"]`);
    let averageReturn = container.dataset.averageReturn;

    const tickSpacing = 10; // px entre cada 1 unidade

    let offsetX = 0;
    let containerCenter;

    function generateScale() {
      scaleEl.innerHTML = '';
      for (let v = minVal; v <= maxVal; v++) {
        const tick = document.createElement('div');
        tick.classList.add('tick');
        if (v % 10 === 0) {
          tick.classList.add('major');
          const lbl = document.createElement('div');
          lbl.className = 'tick-label';
          lbl.textContent = v;
          tick.appendChild(lbl);
        } else {
          tick.classList.add('minor');
        }
        if (v > minVal) tick.style.marginLeft = (tickSpacing - 1) + 'px';
        scaleEl.appendChild(tick);
      }
    }

    function clampOffset() {
      const maxOffset = containerCenter;
      const minOffset = containerCenter - (maxVal - minVal) * tickSpacing;
      if (offsetX > maxOffset) offsetX = maxOffset;
      if (offsetX < minOffset) offsetX = minOffset;
    }

    function updatePosition() {
      // Recalcula centro do container
      containerCenter = container.offsetWidth / 2;

      // Calcula deslocamento corretamente
      offsetX = containerCenter - ((currentVal - minVal) * tickSpacing);

      clampOffset();
      scaleEl.style.transform = `translateX(${offsetX}px)`;
    }

    function updateDisplay() {
      numberEl.textContent = currentVal;
    }

    function getClientX(e) {
      return e.touches ? e.touches[0].clientX : e.clientX;
    }

    let isDragging = false,
      startX, startOffset;

    function startDrag(e) {
      isDragging = true;
      startX = getClientX(e);
      startOffset = offsetX;
      scaleEl.classList.add('dragging');

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', endDrag);
      document.addEventListener('touchmove', onMove, {
        passive: false
      });
      document.addEventListener('touchend', endDrag);
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const dx = getClientX(e) - startX;
      offsetX = startOffset + dx;
      clampOffset();
      scaleEl.style.transform = `translateX(${offsetX}px)`;
      const val = Math.round((containerCenter - offsetX) / tickSpacing + minVal);
      if (val >= minVal && val <= maxVal) {
        currentVal = val;
        updateDisplay();
      }
    }

    function endDrag() {
      if (!isDragging) return;
      isDragging = false;
      scaleEl.classList.remove('dragging');
      updateDataFieldBinding();

      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', endDrag);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', endDrag);
    }

    function updateDataFieldBinding() {
      // Inicializa o array no objeto bindingValues para este ID, se ainda n&atilde;o existir
      let newSliderRuleVal = convertValue(currentVal, unitLabelEl.textContent.trim(), averageReturn)
      if (!bindingValues[container.id]) {
        bindingValues[container.id] = [];
      }

      // Insere o valor da op&ccedil;&atilde;o no bindingValues
      bindingValues[container.id] = newSliderRuleVal
      dataFieldBinding.forEach(option => {
        option.textContent = newSliderRuleVal
      })
    }

    function getUnits(el) {
      minVal = parseFloat(el.dataset.sliderRuleMin);
      maxVal = parseFloat(el.dataset.sliderRuleMax);
      if (currentVal < minVal) currentVal = minVal;
      if (currentVal > maxVal) currentVal = maxVal;
    }

    scaleEl.addEventListener('mousedown', startDrag);
    scaleEl.addEventListener('touchstart', startDrag, {
      passive: false
    });

    toggleEls.forEach(el => {

      el.addEventListener('click', () => {
        getUnits(el);
        generateScale();
        updatePosition();
        updateDisplay();

        toggleEls.forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        unit = el.textContent;
        unitLabelEl.textContent = unit;
        updateDataFieldBinding()
      });
    });

    function init() {
      containerCenter = container.offsetWidth / 2;
      generateScale();
      updatePosition();
      updateDisplay();
      updateDataFieldBinding();
    }

    window.addEventListener('resize', () => {
      containerCenter = container.offsetWidth / 2;
      updatePosition();
    });

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        init();
      });
    });
  }
</script>

<script>
  const operators = {
    "==": (a, b) => a === b,
    "!=": (a, b) => a !== b,
    "<": (a, b) => compareDynamic(a, b, (x, y) => x < y),
    ">": (a, b) => compareDynamic(a, b, (x, y) => x > y),
    ">=": (a, b) => compareDynamic(a, b, (x, y) => x >= y),
    "<=": (a, b) => compareDynamic(a, b, (x, y) => x <= y),
    "includes": (a, b) => a.toString().includes(b),
  };

  const compareDynamic = (a, b, opFn) => {
    const numA = parseFloat(a);
    const numB = parseFloat(b);
    const bothAreNumbers = !isNaN(numA) && !isNaN(numB);
    return bothAreNumbers ? opFn(numA, numB) : opFn(a.toString(), b.toString());
  };
  // Fun&ccedil;&atilde;o principal de verifica&ccedil;&atilde;o de regras de visibilidade
  function checkVisibilityRules(rules, variables) {
    if (!rules.length) return undefined;

    return rules.some(ruleGroup =>
      ruleGroup.every(rule => validateRule(rule, variables))
    );
  }

  // Fun&ccedil;&atilde;o para validar uma &uacute;nica regra
  function validateRule(rule, variables) {
    if (!isVariableValid(rule.field, variables) || !isVariableValid(rule.value, variables)) return false;

    const field = evaluateExpression(replaceVariable(rule.field, variables)) ?? replaceVariable(rule.field, variables);
    const value = evaluateExpression(replaceVariable(rule.value, variables)) ?? replaceVariable(rule.value, variables);

    return operators[rule.operator] ? operators[rule.operator](field, value) : false;
  }

  // Verifica se uma vari&aacute;vel cont&eacute;m chaves v&aacute;lidas
  function isVariableValid(variable, variables) {
    if (!variable) {
      // Se a vari&aacute;vel &eacute; nula ou vazia, retorna true
      return true;
    }
    // Extrair todas as vari&aacute;veis delimitadas por [[...]]
    const matches = variable.match(/\[\[[^\]]+\]\]/g); // Corrigi o regex para capturar vari&aacute;veis corretamente

    // Verificar se todas as vari&aacute;veis encontradas existem em `variables`
    if (matches) {
      return matches.every(match => {
        const key = match.replace(/\[\[|\]\]/g, ""); // Remove os delimitadores [[ e ]]
        const exists = variables.hasOwnProperty(key); // Verifica se existe em variables
        return exists;
      });
    }
    // Se n&atilde;o houver vari&aacute;veis delimitadas, retorna true
    return true;
  }


  // Calcula a express&atilde;o de forma segura
  function evaluateExpression(expression, options = {
    int: false
  }) {
    if (!expression || !/^[0-9+\-*/().\s]*$/.test(expression)) return null;
    try {
      return options.int ? parseInt(eval(expression), 10) : eval(expression).toFixed(2);
    } catch (error) {
      console.error("Erro ao calcular a express&atilde;o:", error);
      return null;
    }
  }
  // Substitui vari&aacute;veis dentro de uma string
  function replaceVariable(text, variables, mode = null) {
    if (!text) return "";
    if (mode === "devmode") return text.replace(/\[\[\s*([\w.]+)\s*\]\]/g, '<span class="content-variable font-app">$1');

    Object.keys(variables).forEach(key => {
      const regex = new RegExp(`\\[\\[${key}\\]\\]`, "g");
      text = text.replace(regex, formatVariableValue(variables[key]));
    });

    return cleanCalcExpressions(text);
  }

  // Remove express&otilde;es calc() de uma string
  function cleanCalcExpressions(text) {
    let result = "";
    let index = 0;

    while (index < text.length) {
      let startIndex = text.indexOf("calc(", index);
      if (startIndex === -1) {
        result += text.substring(index);
        break;
      }
      result += text.substring(index, startIndex);
      index = findClosingParenthesis(text, startIndex + 5) + 1;
    }

    return result;
  }

  // Formata o valor da vari&aacute;vel para num&eacute;rico, se aplic&aacute;vel
  function formatVariableValue(value) {
    return isNumeric(value) ? Number(value) : value;
  }

  // Fun&ccedil;&atilde;o para checar se um valor &eacute; num&eacute;rico
  function isNumeric(expression) {
    const validPattern = /^[\d+\-*/().\s]*$/;
    return typeof expression === "number" || (validPattern.test(expression) && isBalanced(expression));
  }

  // Checa se os par&ecirc;nteses est&atilde;o balanceados
  function isBalanced(expression) {
    let balance = 0;
    for (let char of expression) {
      if (char === '(') balance++;
      else if (char === ')') balance--;
      if (balance < 0) return false;
    }
    return balance === 0;
  }

  // Encontra o par&ecirc;ntese de fechamento correspondente
  function findClosingParenthesis(text, start) {
    let balance = 1;
    for (let i = start; i < text.length; i++) {
      if (text[i] === '(') balance++;
      else if (text[i] === ')') balance--;
      if (balance === 0) return i;
    }
    return -1;
  }
</script>

  let initialStep = steps[0];

  
  const activeTimers = new Map(); // Guarda { timeoutId, intervalId } para cada progressBar

  function startProgress(textPercent, progressBar, duration, delay, index) {
    // Cancela qualquer timeout/interval anterior
    const timers = activeTimers.get(index);
    if (timers) {
      progressBar.style.width = 0 + '%'
      textPercent.textContent = 0 + '%'
      clearTimeout(timers.timeoutId);
      clearInterval(timers.intervalId);
      activeTimers.delete(index);
    }
    console.log('activeTimers: ', activeTimers)
    const timeoutId = setTimeout(() => {
      let i = 0;
      const intervalId = setInterval(() => {
        if (i <= 100) {
          textPercent.textContent = i + '%';
          progressBar.style.width = i + '%';
          i++;
        } else {
          clearInterval(intervalId);
          activeTimers.delete(progressBar); // limpa os timers salvos

          setTimeout(() => {
            let button = progressBar.firstElementChild;
            let redirectStep = button.getAttribute('data-redirect-step');
            let redirectType = button.getAttribute('data-redirect-type');
            if (redirectType === 'step') {
              button.click();
            } else if (redirectType === 'link') {
              window.location.href = redirectStep;
            }
          }, 500);
        }
      }, duration * 10);

      // Atualiza o Map com o interval ativo
      activeTimers.set(index, {
        timeoutId: null,
        intervalId
      });
    }, delay * 1000);

    // Salva o timeout inicial
    activeTimers.set(index, {
      timeoutId,
      intervalId: null
    });
  }

  function setPoints(stepElement) {
    // Seleciona todos os elementos com o atributo `data-option-point`
    const pointElements = stepElement.querySelectorAll('[data-option-point]');

    pointElements.forEach(point => {
      // Fun&ccedil;&atilde;o para calcular a pontua&ccedil;&atilde;o
      const calculateScore = () => {
        const pointValue = Number(point.dataset.optionPoint); // Obt&eacute;m o valor da pontua&ccedil;&atilde;o do atributo `data-option-point`

        // Tratamento para elementos do tipo checkbox
        if (point.classList.contains('option-type-checkbox')) {
          if (point.classList.contains('rocketp-element-active-option')) {
            bindingValues.score += pointValue; // Adiciona a pontua&ccedil;&atilde;o
          } else {
            bindingValues.score -= pointValue; // Remove a pontua&ccedil;&atilde;o
          }
        }

        // Tratamento para elementos do tipo radio
        if (point.classList.contains('option-type-radio')) {
          // Verifica se o passo associado ao elemento atual &eacute; diferente do &uacute;ltimo armazenado
          if (point.getAttribute('data-redirect-step-id') !== dataRadioNextStepId) {
            // Substitui a pontua&ccedil;&atilde;o anterior pela nova, caso o ID de op&ccedil;&atilde;o corresponda
            if (point.getAttribute('data-option-id') === dataRadioOptionId) {
              bindingValues.score -= Math.abs(dataRadioOptionIdValue);
              bindingValues.score += Math.abs(pointValue);
            } else {
              // Adiciona a nova pontua&ccedil;&atilde;o
              bindingValues.score += pointValue;
            }

            // Atualiza os valores globais relacionados ao &uacute;ltimo radio selecionado
            dataRadioOptionIdValue = pointValue;
            dataRadioNextStepId = point.getAttribute('data-redirect-step-id');

          dataRadioOptionId = point.getAttribute('data-option-id');

        // Atualiza a pontua&ccedil;&atilde;o na tela
        updateScore(stepElement);

        // Aplica regras de visibilidade baseadas nas mudan&ccedil;as
        displayRules(stepElement);

      // Garante que o evento de clique seja adicionado apenas uma vez
      if (!point.hasAttribute('data-event-added')) {

<script>

let animations = ["is-fade", "slide-right", "slide-left", "slide-top", "slide-bottom", "is-bounce", "is-zoom", "is-flip", "is-fol", "is-roll", "is-elastic", "to-float-1", "to-float-2", "to-float3"];

animations.forEach(animation => {
  const observer = new IntersectionObserver(entries => { // Cria o observador
    entries.forEach(entry => { // Para cada elemento observado
      if (entry.isIntersecting) { // Se o elemento estiver vis&iacute;vel na tela
        entry.target.classList.add(animation); // Adiciona a classe de anima&ccedil;&atilde;o
        observer.unobserve(entry.target); // Para de observar o elemento
      } else {
        entry.target.classList.remove(animation); // Remove a classe de anima&ccedil;&atilde;o
      }
    });
  }, { threshold: [0, 0.5, 1] }); // Define o threshold - (ponto de observa&ccedil;&atilde;o, para que o elemento seja animado)

  const elements = Array.from(document.querySelectorAll(`.${animation}`)); // Seleciona todos os elementos com a classe de anima&ccedil;&atilde;o
  elements.forEach(element => {
    observer.observe(element); // Observa cada elemento
  });
});
</script>
